services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: reportflow
      POSTGRES_USER: reportflow
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # mount source for hot reload
      - /app/.venv
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Celery workers
  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.workers.celery_app worker -Q default -c 4 --loglevel=info --hostname=worker-default@%h
    volumes:
      - ./backend:/app # mount source for hot reload
      - /app/.venv
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker-high:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.workers.celery_app worker
      --queues=high
      --concurrency=2
      --loglevel=info
      --hostname=worker-high@%h
    volumes:
      - ./backend:/app
      - /app/.venv
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker-low:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.workers.celery_app worker -Q low -c 1 --loglevel=info --hostname=worker-default@%h
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Celery Beat
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A app.workers.celery_app beat -l info --scheduler celery.beat.PersistentScheduler
    volumes:
      - ./backend:/app
      - /app/.venv
      - celery_beat_data:/tmp/celerybeat # persists schedule state between restarts
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  celery_beat_data:
